<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Local AI Chat</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .user {
            background: #0059ff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai {
            background: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        #inputBar {
            display: flex;
            padding: 12px;
            background: #222;
            border-top: 1px solid #333;
        }

        #prompt {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: #333;
            color: #eee;
        }

        #send {
            margin-left: 10px;
            padding: 0 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #0059ff;
            color: white;
            cursor: pointer;
        }

            #send:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

        .error {
            background: #440000;
        }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div id="inputBar">
        <input id="prompt" placeholder="Send a message…" autocomplete="off">
        <button id="send">Send</button>
    </div>

    <script>
        const chat = document.getElementById("chat");
        const promptEl = document.getElementById("prompt");
        const sendBtn = document.getElementById("send");

        function addMessage(text, cls) {
            const div = document.createElement("div");
            div.className = `msg ${cls}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const prompt = promptEl.value.trim();
            if (!prompt) return;

            addMessage(prompt, "user");
            promptEl.value = "";
            sendBtn.disabled = true;

            // ⭐ Escape Windows backslashes BEFORE JSON encoding
            const safePrompt = prompt.replace(/\\/g, "\\\\");

            try {
                const res = await fetch("http://localhost:8080/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: safePrompt })
                });


                const contentType = res.headers.get("content-type");

                if (!res.ok) {
                    const errText = await res.text();
                    addMessage(`Error ${res.status}: ${errText || 'Server error'}`, "ai error");
                    return;
                }

                let data;
                if (contentType && contentType.includes("application/json")) {
                    data = await res.json();
                    const output = data.output || data.response || data.text || data.message || JSON.stringify(data);
                    addMessage(output, "ai");
                } else {
                    // Plain text response
                    const text = await res.text();
                    addMessage(text || "(empty response)", "ai");
                }
            } catch (e) {
                console.error(e);
                addMessage("Connection error - is ai_shell.exe running on port 8080?", "ai error");
            } finally {
                sendBtn.disabled = false;
                promptEl.focus();
            }
        }

        sendBtn.onclick = sendMessage;

        promptEl.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initial focus
        promptEl.focus();
    </script>

</body>
</html>
