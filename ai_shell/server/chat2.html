<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Shell</title>
    <style>
        :root {
            --bg: #111;
            --sidebar: #181818;
            --chat-bg: #1a1a1a;
            --accent: #0066ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: #eee;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-btn {
            padding: 14px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            color: white;
        }

        #newChatBtn {
            background: var(--accent);
        }

        #deleteChatBtn {
            background: #aa0000;
        }

        #conversations {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .convItem {
            padding: 12px;
            margin-bottom: 8px;
            background: #222;
            border-radius: 6px;
            cursor: pointer;
            word-break: break-all;
        }

            .convItem:hover {
                background: #333;
            }

            .convItem.active {
                background: var(--accent);
            }

        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0; /* ← Important fix */
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden; /* ← Prevents horizontal scroll */
            padding: 20px;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word; /* ← Strong break */
            white-space: pre-wrap;
            overflow-x: hidden; /* ← Extra safety */
        }

        .user {
            background: var(--accent);
            align-self: flex-end;
        }

        .ai {
            background: #2a2a2a;
            align-self: flex-start;
        }

        /* Force long links and images to wrap/scale */
        .msg a, .msg img {
            max-width: 100%;
            word-break: break-all;
            overflow-wrap: break-word;
        }

        #inputBar {
            padding: 16px 20px;
            background: #1f1f1f;
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0; /* ← Keeps input bar from shrinking */
        }

        #prompt {
            flex: 1;
            padding: 16px 20px;
            font-size: 17px;
            background: #2a2a2a;
            color: #eee;
            border: 1px solid #444;
            border-radius: 12px;
            resize: none;
            min-height: 54px;
            max-height: 160px;
            line-height: 1.5;
        }

            #prompt:focus {
                outline: none;
                border-color: var(--accent);
            }

        #send {
            padding: 16px 32px;
            font-size: 17px;
            font-weight: bold;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }

        #progress-bar {
            height: 4px;
            background: #4caf50;
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <button id="newChatBtn" class="sidebar-btn">+ New Chat</button>
        <button id="deleteChatBtn" class="sidebar-btn">Delete Chat</button>
        <div id="conversations"></div>
    </div>

    <div id="main">
        <div id="chat"></div>
        <div id="progress-bar"></div>

        <div id="inputBar">
            <textarea id="prompt" placeholder="Send a message…" rows="1"></textarea>
            <button id="send">Send</button>
        </div>
    </div>

    <script>
        // (Your existing JavaScript - unchanged for now)
        let convId = null;
        let conversations = JSON.parse(localStorage.getItem("conversations") || "{}");

        function saveConversations() {
            localStorage.setItem("conversations", JSON.stringify(conversations));
        }

        function createConversation() {
            convId = "conv_" + Date.now();
            conversations[convId] = [];
            saveConversations();
            renderSidebar();
            loadConversation(convId);
        }

        function loadConversation(id) {
            convId = id;
            renderSidebar();
            document.getElementById("chat").innerHTML = "";
            conversations[id].forEach(msg => addMessage(msg.text, msg.role));
        }

        function renderSidebar() {
            const list = document.getElementById("conversations");
            list.innerHTML = "";
            Object.keys(conversations).forEach(id => {
                const div = document.createElement("div");
                div.className = `convItem ${id === convId ? "active" : ""}`;
                div.textContent = conversations[id][0]?.text?.slice(0, 50) || "New chat";
                div.onclick = () => loadConversation(id);
                list.appendChild(div);
            });
        }

        function deleteConversation() {
            if (!convId || !confirm("Delete this chat?")) return;
            delete conversations[convId];
            saveConversations();
            const keys = Object.keys(conversations);
            keys.length ? loadConversation(keys[0]) : createConversation();
        }

        function addMessage(text, role) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;

            let html = text
                .replace(/\n\n+/g, '</p><p>')
                .replace(/\n/g, '<br>');

            html = `<p>${html}</p>`;
            div.innerHTML = html;

            document.getElementById("chat").appendChild(div);
            document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
        }

        // Send function (basic version)
        async function sendMessage() {
            const promptEl = document.getElementById("prompt");
            const text = promptEl.value.trim();
            if (!text) return;

            addMessage(text, "user");
            if (!conversations[convId]) conversations[convId] = [];
            conversations[convId].push({ role: "user", text });
            saveConversations();

            promptEl.value = "";
            document.getElementById("send").disabled = true;

            const aiDiv = document.createElement("div");
            aiDiv.className = "msg ai";
            document.getElementById("chat").appendChild(aiDiv);

            document.getElementById("send").disabled = false;
            promptEl.focus();
        }

        document.getElementById("send").onclick = sendMessage;
        document.getElementById("prompt").addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById("newChatBtn").onclick = createConversation;
        document.getElementById("deleteChatBtn").onclick = deleteConversation;

        if (Object.keys(conversations).length === 0) createConversation();
        else {
            convId = Object.keys(conversations)[0];
            renderSidebar();
            loadConversation(convId);
        }
    </script>
</body>
</html>
